name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    name: Deploy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch encrypted credentials from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_CREDENTIALS_BUCKET }}
        run: |
          set -euo pipefail
          node tools/credential-tools.mjs pull
          jq -e '
            (.ciphertext | type == "string" and length > 0) and
            (.iv | type == "string" and length > 0)
          ' credentials.enc.json >/dev/null \
            || { echo "::error::credentials.enc.json must contain non-empty ciphertext and iv strings"; exit 1; }

      - name: Fetch configuration files from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ vars.R2_CREDENTIALS_BUCKET }}
        run: |
          aws s3 cp s3://$BUCKET/env.txt .env --endpoint-url $ENDPOINT_URL
          aws s3 cp s3://$BUCKET/wrangler.toml wrangler.toml --endpoint-url $ENDPOINT_URL
          aws s3 cp s3://$BUCKET/branding.json branding.json --endpoint-url $ENDPOINT_URL

