name: 'Upstream Sync'

on:
  schedule:
    - cron: "0 18 * * *"
      timezone: "Europe/Budapest"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo
    steps:

    - name: Checkout forked repo
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Add upstream remote
      run: git remote add upstream https://github.com/FxEmbed/FxEmbed

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Configure Git
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"

    - name: Merge and Push (or PR on conflict)
      env:
        GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git checkout main

        # Try to merge upstream/main into local main.
        # We use merge instead of rebase to avoid rewriting history with merge commits
        # and prevent force-pushing to a protected main branch.
        if git merge upstream/main -m "Merge upstream changes"; then
          echo "Sync successful, pushing to main"
          git push origin main
        else
          echo "Collision detected! Aborting merge and creating a clean PR."
          git merge --abort

          # Create a new branch pointing to upstream/main
          BRANCH_NAME="sync-upstream-$(date +%Y%m%d%H%M)"
          git checkout -b $BRANCH_NAME upstream/main

          # Push the clean upstream state to our fork
          git push origin $BRANCH_NAME

          # Create a PR from the clean upstream branch to our main, targeting this fork
          gh pr create --repo ${{ github.repository }} \
                       --title "Manual Sync Required: Upstream Conflicts" \
                       --body "Automatic merge failed due to conflicts. Please resolve the conflicts directly in this PR." \
                       --base main --head $BRANCH_NAME
        fi
